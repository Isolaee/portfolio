services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    volumes:
      - ./server/src:/app/src
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      PORTFOLIO_NAME: 'Eero Isola'
      PORTFOLIO_TITLE: 'Software Developer'
      PORTFOLIO_EMAIL: 'eero.isola@gmail.com'
      PORTFOLIO_GITHUB: 'https://github.com/Isolaee'
      PORTFOLIO_LINKEDIN: 'https://www.linkedin.com/in/eero-isola-78b8561b5/'
      PORTFOLIO_BIO: 'Software developer open to work. Code is just a tool. Learn, build, repeat.'
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health',r=>process.exit(r.statusCode===200?0:1))\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public
    ports:
      - '5173:5173'
    depends_on:
      server:
        condition: service_healthy
